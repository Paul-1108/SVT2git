<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Materialdienst</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    onload="setup()"
    class="min-h-screen bg-gradient-to-br from-slate-100 via-blue-50 to-slate-200 flex items-center justify-center p-6"
  >
    <div class="w-full max-w-xl">
      <div class="bg-white shadow-2xl rounded-3xl p-8 border border-slate-200">
        <div class="text-center mb-8">
          <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">
            Materialdienst
          </h1>
        </div>

        <div
          class="bg-slate-50 border border-slate-200 rounded-2xl p-5 mb-6 text-center"
        >
          <h2 id="KW" class="text-xl md:text-2xl font-semibold text-slate-700">
            Materialdienst für Kalenderwoche
          </h2>
        </div>

        <div id="outputContainer" class="mb-8">
          <ul id="personList" class="space-y-4">
            <li
              id="person1"
              class="bg-blue-100 text-blue-900 font-medium text-lg rounded-xl px-5 py-4 shadow-sm border border-blue-200"
            ></li>
            <li
              id="person2"
              class="bg-blue-100 text-blue-900 font-medium text-lg rounded-xl px-5 py-4 shadow-sm border border-blue-200"
            ></li>
            <li
              id="person3"
              class="bg-blue-100 text-blue-900 font-medium text-lg rounded-xl px-5 py-4 shadow-sm border border-blue-200"
            ></li>
          </ul>
        </div>

        <div class="flex flex-col sm:flex-row gap-4">
          <button
            onclick="previousWeek()"
            class="flex-1 bg-slate-700 hover:bg-slate-800 text-white font-semibold py-3 px-5 rounded-xl transition duration-200 shadow-md"
          >
            ← Vorherige Woche
          </button>

          <button
            onclick="nextWeek()"
            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-5 rounded-xl transition duration-200 shadow-md"
          >
            Nächste Woche →
          </button>
        </div>
      </div>
    </div>

    <script src="./players.js"></script>
    <script>
      let currentDate;

      function getCalendarWeek(date) {
        const jan1 = new Date(date.getFullYear(), 0, 1);
        const dayOfWeekJan1 = jan1.getDay();
        const daysToFirstMonday = (dayOfWeekJan1 + 6) % 7;

        const firstMonday = new Date(
          jan1.getFullYear(),
          0,
          1 + daysToFirstMonday
        );

        const calendarWeekNumber =
          Math.ceil(
            (date.getTime() - firstMonday.getTime()) /
              (7 * 24 * 60 * 60 * 1000)
          ) + 1;

        return calendarWeekNumber;
      }

      async function setup() {
          currentDate = new Date();
          updateDisplay();
      }

      function nextWeek() {
        currentDate.setDate(currentDate.getDate() + 7);
        updateDisplay();
      }

      function previousWeek() {
        currentDate.setDate(currentDate.getDate() - 7);
        updateDisplay();
      }

      function updateDisplay() {
        if (players.length === 0) return;

        const calendarWeek = getCalendarWeek(currentDate);

        document.getElementById(
          "KW"
        ).innerHTML = `Materialdienst für Kalenderwoche ${calendarWeek}`;

        refreshList(calendarWeek);
      }

      function refreshList(calendarWeek) {
        if (players.length === 0) return;

        let baseIndex = (calendarWeek * 3) % players.length;

        let player1 = players[baseIndex];
        let player2 = players[(baseIndex + 1) % players.length];
        let player3 = players[(baseIndex + 2) % players.length];

        document.getElementById("person1").innerText = player1;
        document.getElementById("person2").innerText = player2;
        document.getElementById("person3").innerText = player3;
      }
    </script>
  </body>
</html>
